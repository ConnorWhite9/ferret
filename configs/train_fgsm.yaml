# Phase 2 dev config — FGSM only (fast, no PGD/CW precompute)
# Reproducible: pin seed and all hyperparameters here.
# Usage: python -m train.ppo_train $(python -c "
#   import yaml, sys
#   cfg = yaml.safe_load(open('configs/train_fgsm.yaml'))
#   print(' '.join(f'--{k.replace(\"_\",\"-\")} {v}' for k,v in cfg.items() if v is not True and v is not False)
#         + ' ' + ' '.join(f'--{k.replace(\"_\",\"-\")}' for k,v in cfg.items() if v is True))")
#
# Or simpler: use make train-fgsm

exp_name: ferret_fgsm
seed: 42
cuda: true
torch_deterministic: true

# PPO
total_timesteps: 500000
learning_rate: 0.00025
num_envs: 4
num_steps: 128
anneal_lr: true
gamma: 0.99
gae_lambda: 0.95
num_minibatches: 4
update_epochs: 4
norm_adv: true
clip_coef: 0.2
clip_vloss: true
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5

# MORL / data
adversarial_ratio: 0.5
attack_types: ["fgsm"]
precompute_adversarial: true
dataset: imagenette
download_data: true
max_budget: 10
lambda_anneal: true
lambda_start: 0.01
lambda_end: 0.05

# Checkpointing
checkpoint_every: 50

# Val eval during training (0 = disabled)
eval_every: 100
eval_episodes: 50

# Tracking
track: false
wandb_project_name: ferret
